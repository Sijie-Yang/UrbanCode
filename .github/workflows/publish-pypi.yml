# Publish to PyPI using OIDC (no long-lived token in the repo).
# PyPI project → Publishing → Add "GitHub" trusted publisher for this repo + workflow file.
name: Publish to PyPI

on:
  workflow_dispatch: {}
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build
        run: python -m pip install --upgrade pip build

      - name: Build sdist and wheel
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
